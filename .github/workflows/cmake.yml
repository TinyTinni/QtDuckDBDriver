name: CMake

on:
  push:
    branches: [ "main" ]
    tags: [ "**" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:
    inputs:
      release_tag:
        description: Tag to package and publish, for example v0.2.1. Leave empty to run build/test only.
        required: false
        type: string

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ !startsWith(github.ref, 'refs/tags/') }}

env:
  CPM_SOURCE_CACHE: ${{ github.workspace }}/cpm_modules
  CCACHE_BASEDIR: ${{ github.workspace }}
  CCACHE_DIR: ${{ github.workspace }}/.ccache
  CCACHE_COMPRESS: true
  CCACHE_COMPRESSLEVEL: 6
  CCACHE_MAXSIZE: 400M
  CMAKE_C_COMPILER_LAUNCHER: ccache
  CMAKE_CXX_COMPILER_LAUNCHER: ccache

jobs:
   build:
    name: Build And Test (${{ matrix.os }}, Qt ${{ matrix.qt_version }})
    strategy:
      fail-fast: false
      matrix:
          os: ["windows-latest", "ubuntu-latest", "macos-latest"]
          qt_version: ["5.15.18", "6.11.1"]
          exclude:
            - os: "macos-latest"
              qt_version: "5.15.18" # only available for x86, macos compiles on arm
    runs-on: ${{ matrix.os }}

    steps:
    - uses: actions/checkout@v7
      with:
        ref: ${{ github.event.inputs.release_tag != '' && github.event.inputs.release_tag || github.ref }}
    
    - name: Cache
      uses: actions/cache@v6
      with:
        path: |
          ${{ github.workspace }}/.ccache
          ${{ github.workspace }}/cpm_modules
        key: ${{ runner.os }}-${{ matrix.os }}-${{ matrix.qt_version }}-${{ hashFiles('**/CMakeLists.txt', 'cmake/**/*.cmake', '.github/workflows/cmake.yml', 'QtDuckDBDriver/duckdb.json') }}
        restore-keys: |
          ${{ runner.os }}-${{ matrix.os }}-${{ matrix.qt_version }}

    - name: Install Qt
      uses: jurplel/install-qt-action@v4
      with:
        version: ${{matrix.qt_version}}
        target: 'desktop'
        cache: true

    - name: Setup Cpp
      uses: aminya/setup-cpp@v1
      with:
        vcvarsall: ${{ contains(matrix.os, 'windows' )}}
        ninja: true
        ccache: true

    - name: Configure CMake
      run: cmake --preset ci-test

    - name: Build Tests
      run: cmake --build --preset ci-test-build

    - name: Test
      run: ctest --preset ci-test -j

    - name: ccache stats
      run: ccache -s

   package_windows:
    name: Package Windows Release (Qt ${{ matrix.qt_version }})
    if: startsWith(github.ref, 'refs/tags/') || github.event.inputs.release_tag != ''
    needs: build
    strategy:
      fail-fast: false
      matrix:
        qt_version: ["5.15.18", "6.11.1"]
    runs-on: windows-latest
    env:
      RELEASE_TAG_NAME: ${{ github.event.inputs.release_tag != '' && github.event.inputs.release_tag || github.ref_name }}

    steps:
    - uses: actions/checkout@v7
      with:
        ref: ${{ github.event.inputs.release_tag != '' && github.event.inputs.release_tag || github.ref }}
    
    - name: Cache
      uses: actions/cache@v6
      with:
        path: |
          ${{ github.workspace }}/.ccache
          ${{ github.workspace }}/cpm_modules
        key: ${{ runner.os }}-windows-latest-${{ matrix.qt_version }}-${{ hashFiles('**/CMakeLists.txt', 'cmake/**/*.cmake', '.github/workflows/cmake.yml', 'QtDuckDBDriver/duckdb.json') }}
        restore-keys: |
          ${{ runner.os }}-windows-latest-${{ matrix.qt_version }}

    - name: Install Qt
      uses: jurplel/install-qt-action@v4
      with:
        version: ${{ matrix.qt_version }}
        target: 'desktop'
        cache: true

    - name: Setup Cpp
      uses: aminya/setup-cpp@v1
      with:
        vcvarsall: true
        ninja: true
        ccache: true

    - name: Configure CMake
      run: cmake --preset ci-package

    - name: Build Package
      run: |
        cmake --build --preset ci-package-install
        cmake --build --preset ci-package-bundle

    - name: Upload Release Bundle
      uses: actions/upload-artifact@v7
      with:
        name: release-bundle-${{ env.RELEASE_TAG_NAME }}-qt${{ matrix.qt_version }}
        path: ${{github.workspace}}/build/QtDuckDBDriver/QtDuckDBDriver-*
        if-no-files-found: error
        compression-level: 0

    - name: ccache stats
      run: ccache -s

   release:
    name: Create GitHub Release
    if: startsWith(github.ref, 'refs/tags/') || github.event.inputs.release_tag != ''
    needs: package_windows
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      RELEASE_TAG_NAME: ${{ github.event.inputs.release_tag != '' && github.event.inputs.release_tag || github.ref_name }}

    steps:
    - name: Download Release Bundle
      uses: actions/download-artifact@v8
      with:
        pattern: release-bundle-${{ env.RELEASE_TAG_NAME }}-*
        path: release-assets
        merge-multiple: true

    - name: Generate Checksums
      run: |
        cd release-assets
        sha256sum * > SHA256SUMS.txt

    - name: Publish Release
      uses: softprops/action-gh-release@v3
      with:
        name: ${{ env.RELEASE_TAG_NAME }}
        tag_name: ${{ env.RELEASE_TAG_NAME }}
        files: release-assets/*
        fail_on_unmatched_files: true
        generate_release_notes: true
        prerelease: ${{ contains(env.RELEASE_TAG_NAME, '-') }}
